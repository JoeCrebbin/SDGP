<!DOCTYPE html>
<html>
  <head>
    <title>Grant Vessels - Register</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body class="auth-page">
    <div id="main-content">
      <h1>Create Account</h1>
      <p>Register for access (requires admin approval)</p>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@grantvessels.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Choose a password">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password">
      </div>
      <button class="primary-btn" onclick="handleRegister()" style="width:100%; margin-top:4px;">Register</button>
      <p class="message" id="message"></p>
      <p style="text-align:center; font-size:13px;"><a href="./index.html">Already have an account? Login here.</a></p>
    </div>
    <script src="../js/pages/auth.js"></script>
  </body>
</html>
