<!DOCTYPE html>
<html>
  <head>
    <title>Grant Vessels - System Logs</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body>
    <div id="sidenav-container"></div>
    <div id="main-content">
      <h1>System Logs</h1>
      <p>View recent activity across the application.</p>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px;">
          <input type="text" id="log-search" placeholder="Search by email, action or detail..." style="max-width:300px;">
          <button class="secondary-btn" id="log-search-btn">Search</button>
        </div>
        <div class="csv-viewer">
          <table>
            <thead>
              <tr><th>Date</th><th>User</th><th>Action</th><th>Detail</th></tr>
            </thead>
            <tbody id="logs-body">
              <tr><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="../js/components/sidenav.js"></script>
    <script src="../js/admin/logs.js"></script>
  </body>
</html>
