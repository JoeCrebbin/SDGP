<!DOCTYPE html>
<html>
  <head>
    <title>Grant Vessels - My Settings</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body>
    <div id="sidenav-container"></div>
    <div id="main-content">
      <h1>My Settings</h1>
      <hr>
      <p>Change Password</p>
      <input type="password" id="current-password" placeholder="Current Password..."><br>
      <input type="password" id="new-password" placeholder="New Password..."><br>
      <input type="password" id="confirm-password" placeholder="Confirm New Password..."><br>
      <button onclick="handleChangePassword()">Change Password</button><br>
      <p id="message"></p><br>
      <hr>
      <p>Delete Account</p>
      <input type="password" id="delete-password" placeholder="Enter Password to Confirm..." style="color: red;"><br>
      <button onclick="handleDeleteAccount()" style="color: red;">Delete Account</button>
    </div>
    <script src="../js/sidenav.js"></script>
  </body>
</html>
