<!DOCTYPE html>
<html>
  <head>
    <title>Grant Vessels - Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body>
    <div id="sidenav-container"></div>

    <div id="main-content">
      <h1>Dashboard</h1>
      <p>Upload the CSV to begin optimisation.</p>

      <section class="upload-section">
        <input type="file" id="csv-file" accept=".csv">
        <button id="inspect-btn" class="secondary-btn">Inspect File</button>
      </section>

      <p id="message"></p>

      <section id="optimisation-settings" style="display:none;">

        <hr>

        <h3>Optimisation Parameters</h3>

        <div class="form-group">
          <label>Batch Name / Reference:</label>
          <input type="text" id="batch-name" placeholder="E.g. Hull_Section_A1">
        </div>

        <div class="form-group">
          <label>First row contains headers?</label>
          <input type="checkbox" id="has-headers">
        </div>

        <div class="form-group">
          <label>Measurement Units:</label>
          <select id="units">
            <option value="mm">Millimeters (mm)</option>
            <option value="cm">Centimeters (cm)</option>
            <option value="m">Meters (m)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Saw Blade Width (mm):</label>
          <input type="number" id="kerf" value="3.0" step ="0.1" min="0">
          <small>Standard shipyard blade kerf is 3.0mm.</small>
        </div>

        <div class="form-group">
          <label>Minimum Reusable Length (mm):</label>
          <input type="number" id="min-remnant" value="500" min="0">
          <small>Pieces shorter than this are logged as waste.</small>
        </div>

        <hr>

        <h4>Column Mapping</h4>
        <p><small>Match your CSV headers to the program's requirements.</small></p>

        <div class="form-group">
          <label>Component ID (E.g. ItemNumber):</label>
          <select id="map-id" class="csv-mapping">
            <option value="">-- Select Column --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Component Length (E.g. Length):</label>
          <select id="map-length" class="csv-mapping">
            <option value="">-- Select Column --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Raw Beam Size (E.g. TotalLength):</label>
          <select id="map-total-length" class="csv-mapping">
            <option value="">-- Select Column --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nest/Material Group (E.g. NestID):</label>
          <select id="map-material" class="csv-mapping">
            <option value="">-- Select Column --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Old Waste Record (E.g. RemainingLength):</label>
          <select id="map-old-waste" class="csv-mapping">
            <option value="">-- Select Column (Optional) --</option>
          </select>
          <small>Used to compare the results against previous efficiency.</small>
        </div>

        <hr>

        <div class="form-group">
          <label>Optimisation Priority:</label>
          <select id="priority">
            <option value="waste">Minimum Material Waste</option>
            <option value="speed">Fastest Cutting Time</option>
          </select>
        </div>

        <hr>

        <button id="btn-submit" class="primary-btn">Run Optimisation</button>
      </section>
    </div>

    <script src="../js/sidenav.js"></script>
    <script src="../js/upload_handler.js"></script>
  </body>
</html>
