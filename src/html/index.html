<!DOCTYPE html>
<html>
  <head>
    <title>Grant Vessels - Login</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body class="auth-page">
    <div id="main-content">
      <h1>Grant Vessels</h1>
      <p>Sign in to continue</p>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@grantvessels.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <button class="primary-btn" onclick="handleLogin()" style="width:100%; margin-top:4px;">Login</button>
      <p class="message" id="message"></p>
      <p style="text-align:center; font-size:13px;"><a href="./register.html">Don't have an account? Register here.</a></p>
    </div>
    <script src="../js/pages/auth.js"></script>
  </body>
</html>
